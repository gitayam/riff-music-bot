<!doctype html>
<html>
<head><meta charset="utf-8"><title>strudel render</title></head>
<body>
<script type="module">
// Loaded inside headless Chromium by strudel-render.mjs.
// Imports the Strudel web bundle and exposes a render entrypoint on window.
// We use the official `renderPatternAudio`, which renders the pattern through an
// OfflineAudioContext (faster-than-realtime, deterministic) and emits a WAV via a
// blob <a download> click — the Playwright driver captures that download.
// Vendored locally (was: https://esm.sh/@strudel/web@1.3.0). The bundle is served
// same-origin by strudel-render.mjs's static server out of node_modules (populated by
// `npm install` here — setup.sh does this). This removes the ONLY hard network dependency
// at render time: a CDN/network blip can no longer blank the whole render. The bundle is
// self-contained (vite inlines the audio worklets); its one external asset — the clock
// worker — resolves relative to this file's URL at dist/assets/, also served locally.
import { initStrudel, evaluate, renderPatternAudio, samples } from './node_modules/@strudel/web/dist/index.mjs';

window.__strudelReady = (async () => {
  // initStrudel wires up the global pattern scope (note, sound, n, stack, scale, …),
  // the transpiler, and the default audio context. Its default prebake only registers
  // SYNTH sounds (sawtooth/sine/…); sample banks must be loaded explicitly or drum/
  // sample voices render silent. We preload the standard packs Strudel.cc ships with.
  await initStrudel();
  // Load each pack independently so one CDN hiccup can't blank the whole render.
  // dirt-samples is served from raw.githubusercontent.com (sends CORS); the drum-machine
  // MAP is vendored same-origin (strudel.cc's copy sends no CORS) with _base pointing at
  // the CORS-enabled geikha raw host where the wavs actually live.
  const load = (label, p) => p.then(() => label + ' ok').catch((e) => label + ' FAIL: ' + e.message);
  window.__samplesStatus = await Promise.all([
    load('dirt', samples('github:tidalcycles/dirt-samples')),     // bd hh sd cp rim …
    load('drum-machines', samples('./tidal-drum-machines.json')), // .bank("RolandTR909"/"RolandTR808"/…)
    load('piano', samples('./piano.json')),                       // sound("piano")
  ]);
  return true;
})();

// Render `code` to a WAV download. cps = cycles per second (setcpm(x) => cps via the
// code itself; we pass a base cps that the code's setcpm overrides). cycles = how many
// cycles to capture. Returns when the download has been triggered.
window.__render = async function (code, { cycles = 4, sampleRate = 44100, cps = 0.5 } = {}) {
  await window.__strudelReady;
  // Evaluate the user code into a pattern (transpiles strudel mini-notation JS → pattern).
  // @strudel/web's evaluate() returns the Pattern itself (has .queryArc).
  const pattern = await evaluate(code);
  if (!pattern || typeof pattern.queryArc !== 'function') throw new Error('evaluate() returned no pattern');
  // renderPatternAudio(pattern, cps, begin, end, sampleRate, maxPolyphony, multiChannelOrbits, filename)
  await renderPatternAudio(pattern, cps, 0, cycles, sampleRate, 128, false, 'tune');
  return { ok: true };
};
</script>
</body>
</html>
