# Riff music API — Cloudflare Worker (Phase 3 P0). Tier-A: prompt → Strudel code + share link.
# Deploy:  npx wrangler deploy            (set secrets first, see below)
# Dev:     npx wrangler dev               (reads .dev.vars — gitignored — for local secrets)
name = "riff-music-api"
main = "src/index.js"
compatibility_date = "2026-06-01"
# No compat flags needed: the Worker uses only fetch/btoa/TextEncoder/AbortController (all in workerd).

# Non-secret config. Point OPENAI_BASE_URL at a Cloudflare AI Gateway in prod for caching +
# rate-limit + cost observability at ~0 added latency (Phase 3 mapping table).
[vars]
OPENAI_MODEL = "gpt-5.4"
OPENAI_BASE_URL = "https://api.openai.com/v1"
RETENTION_DAYS = "30"   # tracks older than this are pruned by the daily cron (D1 10 GB cap)
EMBED_TRACKS = "false"  # "true" → embed each track for /similar ("more like this"). Off = per-write
EMBEDDINGS_MODEL = "text-embedding-3-small"   #   API cost avoided; the similarity feature is dormant.
DISCORD_API_BASE = "https://discord.com/api/v10"   # interaction follow-ups (PATCH @original)
# PUBLIC_BASE_URL = "https://music.example.com"     # the Worker's own origin; lets the Discord path
#   record an absolute audio_url in history (the rendered mp3 is attached to the message regardless).
# RENDER_SERVICE_URL: the render Container's URL (container/). When set + AUDIO bound, /render (and
# /generate|/modify with render:true) render real audio → R2 → served at /audio/<key>. Unset = Tier-A
# (code + link only). Set as a var or, with a Container binding, point at the bound service URL.

[observability]
enabled = true

# Cross-session tracks history (Phase 3 P2, Contract 5). Create the DB once with
# `wrangler d1 create riff-tracks` and paste its id below; `wrangler dev` uses a LOCAL D1 (the id is
# ignored locally). Schema: migrations/0001_create_tracks.sql (apply with `wrangler d1 migrations
# apply riff-tracks --remote`); src/store.js also creates it lazily so local dev / a fresh deploy work.
[[d1_databases]]
binding = "DB"
database_name = "riff-tracks"
database_id = "6fe6b06a-e0cb-4510-be5c-b4fba536e761"
migrations_dir = "migrations"

# Daily retention prune (scheduled() → pruneTracks). 04:00 UTC.
[triggers]
crons = ["0 4 * * *"]

# Rendered audio (Phase 3 P1 last mile). The render Container writes WAV→mp3/ogg here; the Worker
# serves it at GET /audio/<key>. Create once: `wrangler r2 bucket create riff-audio`. Local
# `wrangler dev` uses a local R2 (no account needed). Add a retention/lifecycle rule in prod.
[[r2_buckets]]
binding = "AUDIO"
bucket_name = "riff-audio"

# Per-session modify chain (Phase 3 P2). One Durable Object per conversation (session_id) holds
# the ordered code versions so /modify edits the last one. SQLite-backed; runs locally in `wrangler dev`.
[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "Session"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Session"]

# ── Render service: SELF-HOSTED on Proxmox (moved off Cloudflare Containers to kill idle compute) ──
# The headless-Chromium + ffmpeg renderer (container/server.mjs) now runs on the Proxmox box behind
# the HomeLab CF tunnel. The Worker reaches it over HTTPS via the RENDER_SERVICE_URL secret and a
# shared bearer (renderBytes() reuses MUSIC_API_TOKEN). No container binding here = no CF container bill.
#   wrangler secret put RENDER_SERVICE_URL   # e.g. https://riff-render.juntogroups.org
#
# Migration v2 created the RenderContainer DO class; v3 deletes it now that the container is gone.
[[migrations]]
tag = "v2"
new_sqlite_classes = ["RenderContainer"]

[[migrations]]
tag = "v3"
deleted_classes = ["RenderContainer"]

# Secrets (NOT stored here — set per-environment):
#   npx wrangler secret put OPENAI_API_KEY     # the gpt-5.4 key (local .env OPENAI_API)
#   npx wrangler secret put MUSIC_API_TOKEN    # the shared bearer other groups send
#   npx wrangler secret put DISCORD_PUBLIC_KEY # the app's Ed25519 public key (Discord Dev Portal)
# For `wrangler dev`, put these in worker/.dev.vars (gitignored). See .dev.vars.example.
# After deploy, set the Discord "Interactions Endpoint URL" to https://<worker>/discord/interactions.

# A stable custom-domain route retires the ephemeral quick tunnel (uncomment + set your zone):
# routes = [{ pattern = "music.example.com", custom_domain = true }]
